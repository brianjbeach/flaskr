name: Kiro Code Review

on: [push]

jobs:
  code-review:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Kiro code reviewer agent
        run: |
          kiro-cli chat \
            --agent code-reviewer \
            --trust-all-tools \
            "Review the following changed files in this PR and provide a summary of findings: ${{ steps.changed.outputs.files }}"
