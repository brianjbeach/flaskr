name: Kiro Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: [self-hosted, code-reviewer]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.py' '*.js' '*.ts' '*.java' '*.go' '*.rs' '*.rb' '*.cpp' '*.c' '*.h' | head -50)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run Kiro code review
        if: steps.changed.outputs.files != ''
        run: |
          kiro-cli chat \
            --agent code-reviewer \
            --trust-all-tools \
            "Review the following changed files in this PR and provide a summary of findings: ${{ steps.changed.outputs.files }}"
